name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  npm-package:
    name: npm package sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check installer scripts
        run: |
          node --check packages/blink-cli/scripts/platform.js
          node --check packages/blink-cli/scripts/install.js
          node --check packages/blink-cli/bin/blink.js

      - name: Build the binary the installer will use
        run: cargo build -p blink-cli

      - name: npm install against the local binary (no GitHub release needed)
        working-directory: packages/blink-cli
        run: npm install
        env:
          BLINK_LOCAL_BIN: ${{ github.workspace }}/target/debug/blink

      - name: Run through the installed shim
        working-directory: packages/blink-cli
        run: |
          version=$(node bin/blink.js --version)
          echo "blink.js --version => $version"
          echo "$version" | grep -q "^blink "
