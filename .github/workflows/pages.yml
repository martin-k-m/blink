name: Deploy landing page

# Publishes the static landing page in `website/` to GitHub Pages.
#
# One-time setup (owner action, in the repo UI): Settings → Pages →
# "Build and deployment" → Source → "GitHub Actions". Until that is set,
# this workflow's deploy step cannot publish. It replaces the previous
# "deploy from a branch" mode that rendered README.md via Jekyll.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
