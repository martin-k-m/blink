name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Asset names match packages/blink-cli/scripts/platform.js's
          # TARGETS map exactly — the npm installer downloads these by
          # name, so the two must stay in sync.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: blink-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: blink-linux-arm64
            linker_package: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: blink-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: blink-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: blink-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation linker
        if: matrix.linker_package != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.linker_package }}

      - name: Configure cross-compilation linker
        if: matrix.linker != ''
        run: |
          target_env=$(echo "${{ matrix.target }}" | tr 'a-z-' 'A-Z_')
          echo "CARGO_TARGET_${target_env}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"
        shell: bash

      - name: Build release binary
        run: cargo build --release --locked -p blink-cli --target ${{ matrix.target }}

      - name: Stage binary under its release asset name
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/blink"
          if [[ "${{ matrix.asset_name }}" == *.exe ]]; then
            src="${src}.exe"
          fi
          cp "$src" "dist/${{ matrix.asset_name }}"

      - name: Checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
